name: CI/CD production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  ci:
    name: Vérifications
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Activer pnpm
        run: corepack enable

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Compiler le projet
        run: pnpm build

  deploy:
    name: Déployer sur le serveur
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          set -eu
          test -n "$DEPLOY_SSH_KEY" || { echo 'Secret DEPLOY_SSH_KEY manquant'; exit 1; }
          test -n "$DEPLOY_KNOWN_HOSTS" || { echo 'Secret DEPLOY_KNOWN_HOSTS manquant'; exit 1; }

          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Synchroniser le code
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -eu
          test -n "$DEPLOY_HOST" || { echo 'Secret DEPLOY_HOST manquant'; exit 1; }
          test -n "$DEPLOY_USER" || { echo 'Secret DEPLOY_USER manquant'; exit 1; }

          PORT="${DEPLOY_PORT:-22}"
          PATH_ON_SERVER="${DEPLOY_PATH:-/var/www/crm-kahier}"
          SSH_OPTIONS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -p $PORT"

          ssh $SSH_OPTIONS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$PATH_ON_SERVER'"
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.pnpm-store' \
            --exclude 'node-compile-cache' \
            --exclude '.next' \
            --exclude 'dist' \
            --exclude 'coverage' \
            --exclude '.turbo' \
            --exclude 'packages/db-company/generated' \
            --exclude 'packages/db-crm/generated' \
            --exclude '.deploy.env' \
            --exclude 'secrets' \
            -e "ssh $SSH_OPTIONS" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$PATH_ON_SERVER/"

      - name: Construire et relancer la production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -eu
          PORT="${DEPLOY_PORT:-22}"
          PATH_ON_SERVER="${DEPLOY_PATH:-/var/www/crm-kahier}"
          SSH_OPTIONS="-i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -p $PORT"

          ssh $SSH_OPTIONS "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$PATH_ON_SERVER' && make build ENV=prod"
