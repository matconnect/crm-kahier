services:
  gateway:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: "api/gateway"
        SERVICE_FILTER: "@kahier/api-gateway"
    environment:
      NODE_ENV: production
      PORT_FILE: "/run/secrets/port_gateway"
      CRM_SERVICE_URL_FILE: "/run/secrets/crm_service_url"
      COMPANY_SERVICE_URL_FILE: "/run/secrets/company_service_url"
      KAHIER_SERVICE_URL_FILE: "/run/secrets/kahier_service_url"
      BILLING_SERVICE_URL: "http://billing:3015"
    secrets:
      - port_gateway
      - crm_service_url
      - company_service_url
      - kahier_service_url
    networks:
      - app-net

  crm:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: "api/crm"
        SERVICE_FILTER: "@kahier/crm-service"
    environment:
      NODE_ENV: production
      PORT_FILE: "/run/secrets/port_crm"
      INTERNAL_SERVICE_TOKEN_FILE: "/run/secrets/internal_service_token"
      COMPANY_SERVICE_URL_FILE: "/run/secrets/company_service_url"
      DB_PROTOCOL_FILE: "/run/secrets/db_protocol"
      DB_HOST_FILE: "/run/secrets/db_host"
      DB_PORT_FILE: "/run/secrets/db_port"
      DB_USER_FILE: "/run/secrets/db_crm_user"
      DB_PASSWORD_FILE: "/run/secrets/db_crm_password"
      DB_NAME_FILE: "/run/secrets/db_crm_name"
      AWS_ACCESS_KEY_ID_FILE: "/run/secrets/aws_access_key_id"
      AWS_ACCESS_KEY_FILE: "/run/secrets/aws_access_key"
      AWS_REGION_FILE: "/run/secrets/aws_region"
      AWS_S3_BUCKET_NAME_FILE: "/run/secrets/aws_s3_bucket_name"
    secrets:
      - db_host
      - db_protocol
      - db_port
      - db_crm_password
      - db_crm_user
      - db_crm_name
      - internal_service_token
      - company_service_url
      - port_crm
      - aws_access_key_id
      - aws_access_key
      - aws_region
      - aws_s3_bucket_name
    networks:
      - app-net

  company:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: "api/company"
        SERVICE_FILTER: "@kahier/company-service"
    environment:
      NODE_ENV: production
      PORT_FILE: "/run/secrets/port_company"
      INTERNAL_SERVICE_TOKEN_FILE: "/run/secrets/internal_service_token"
      DB_PROTOCOL_FILE: "/run/secrets/db_protocol"
      DB_HOST_FILE: "/run/secrets/db_host"
      DB_PORT_FILE: "/run/secrets/db_port"
      DB_USER_FILE: "/run/secrets/db_company_user"
      DB_PASSWORD_FILE: "/run/secrets/db_company_password"
      DB_NAME_FILE: "/run/secrets/db_company_name"
      BETTER_AUTH_FILE: "/run/secrets/better_auth"
    secrets:
      - db_host
      - db_protocol
      - db_port
      - db_company_password
      - db_company_user
      - db_company_name
      - internal_service_token
      - port_company
      - better_auth
    networks:
      - app-net

  billing:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: "api/billing"
        SERVICE_FILTER: "@kahier/billing-service"
    environment:
      NODE_ENV: production
      PORT: "3015"
      DB_PROTOCOL_FILE: "/run/secrets/db_protocol"
      DB_HOST_FILE: "/run/secrets/db_host"
      DB_PORT_FILE: "/run/secrets/db_port"
      DB_USER_FILE: "/run/secrets/db_company_user"
      DB_PASSWORD_FILE: "/run/secrets/db_company_password"
      DB_NAME_FILE: "/run/secrets/db_company_name"
      STRIPE_SECRET_KEY_FILE: "/run/secrets/stripe_secret_key"
      STRIPE_PRICE_STARTER_FILE: "/run/secrets/stripe_price_starter"
      STRIPE_PRICE_PRO_FILE: "/run/secrets/stripe_price_pro"
      STRIPE_PRICE_STARTER_YEARLY_FILE: "/run/secrets/stripe_price_starter_yearly"
      STRIPE_PRICE_PRO_YEARLY_FILE: "/run/secrets/stripe_price_pro_yearly"
      APP_PUBLIC_URL_FILE: "/run/secrets/app_public_url"
      STRIPE_WEBHOOK_SECRET_FILE: "/run/secrets/stripe_webhook_secret"
    secrets:
      - db_host
      - db_protocol
      - db_port
      - db_company_password
      - db_company_user
      - db_company_name
      - stripe_secret_key
      - stripe_price_starter
      - stripe_price_pro
      - stripe_price_starter_yearly
      - stripe_price_pro_yearly
      - app_public_url
      - stripe_webhook_secret
    networks:
      - app-net

  kahier:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: "api/kahier"
        SERVICE_FILTER: "@kahier/kahier-service"
    environment:
      KAHIER_API_BASE_FILE: "/run/secrets/kahier_api_base"
      KAHIER_API_KEY_FILE: "/run/secrets/kahier_api_key"
      NODE_ENV: production
      PORT_FILE: "/run/secrets/port_kahier"
    secrets:
      - kahier_api_base
      - kahier_api_key
      - port_kahier
    networks:
      - app-net

  client:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      AUTH_SECRET: "/run/secrets/better_auth"
      BETTER_AUTH_FILE: "/run/secrets/better_auth"
      API_INTERNAL_URL: "http://gateway:3011"
      NEXT_PUBLIC_API_URL: "https://crm.kahier.com"
    secrets:
      - better_auth
    networks:
      - traefik-net
      - app-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.crm-kahier.rule=Host(`crm.kahier.com`)"
      - "traefik.http.routers.crm-kahier.entrypoints=websecure"
      - "traefik.http.routers.crm-kahier.tls.certresolver=myresolver"
      - "traefik.http.services.crm-kahier.loadbalancer.server.port=3000"

secrets:
  db_host:
    file: ./secrets/root/db_host.txt
  db_protocol:
    file: ./secrets/root/db_protocol.txt
  db_port:
    file: ./secrets/root/db_port.txt
  db_company_password:
    file: ./secrets/company/mariadb_company_password.txt
  db_company_root_password:
    file: ./secrets/company/mariadb_company_root_password.txt
  db_company_user:
    file: ./secrets/company/mariadb_company_user.txt
  db_company_name:
    file: ./secrets/company/mariadb_company_name.txt
  db_crm_password:
    file: ./secrets/crm/mariadb_crm_password.txt
  db_crm_user:
    file: ./secrets/crm/mariadb_crm_user.txt
  db_crm_name:
    file: ./secrets/crm/mariadb_crm_name.txt
  internal_service_token:
    file: ./secrets/root/internal_service_token.txt
  port_company:
    file: ./secrets/company/port.txt
  port_crm:
    file: ./secrets/crm/port.txt
  port_kahier:
    file: ./secrets/kahier/port.txt
  port_gateway:
    file: ./secrets/gateway/port.txt
  company_service_url:
    file: ./secrets/gateway/company_service_url.txt
  crm_service_url:
    file: ./secrets/gateway/crm_service_url.txt
  kahier_service_url:
    file: ./secrets/gateway/kahier_service_url.txt
  kahier_api_base:
    file: ./secrets/kahier/api_base.txt
  kahier_api_key:
    file: ./secrets/kahier/api_key.txt
  better_auth:
    file: ./secrets/root/better_auth.txt
  aws_access_key_id:
    file: ./secrets/root/aws_access_key_id.txt
  aws_access_key:
    file: ./secrets/root/aws_access_key.txt
  aws_region:
    file: ./secrets/root/aws_region.txt
  aws_s3_bucket_name:
    file: ./secrets/root/aws_s3_bucket_name.txt
  stripe_secret_key:
    file: ./secrets/stripe/secret_key.txt
  stripe_price_starter:
    file: ./secrets/stripe/price_starter.txt
  stripe_price_pro:
    file: ./secrets/stripe/price_pro.txt
  stripe_price_starter_yearly:
    file: ./secrets/stripe/price_starter_yearly.txt
  stripe_price_pro_yearly:
    file: ./secrets/stripe/price_pro_yearly.txt
  app_public_url:
    file: ./secrets/stripe/app_public_url.txt
  stripe_webhook_secret:
    file: ./secrets/stripe/webhook_secret.txt

networks:
  traefik-net:
    external: true
  app-net:
    driver: bridge
